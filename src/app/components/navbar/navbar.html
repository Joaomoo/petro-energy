<nav class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
    <a routerLink="/" class="navbar-logo" (click)="fecharMenu()">
      <span class="logo-symbol">⬡</span>
      <span class="logo-texto">PETRO<strong>ENERGY</strong></span>
    </a>

    <!-- Links desktop -->
    <ul class="navbar-links">
      <li><a routerLink="/" routerLinkActive="ativo" [routerLinkActiveOptions]="{exact: true}">Início</a></li>
      <li><a routerLink="/institucional" routerLinkActive="ativo">A Empresa</a></li>
      <li><a routerLink="/projetos-sociais" routerLinkActive="ativo">Projetos Sociais</a></li>
    </ul>

    <!-- Botão hamburguer (mobile) -->
    <button class="hamburger" (click)="toggleMenu()" [class.aberto]="menuAberto" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Menu mobile -->
  <div class="menu-mobile" [class.visivel]="menuAberto">
    <ul>
      <li><a routerLink="/" (click)="fecharMenu()">Início</a></li>
      <li><a routerLink="/institucional" (click)="fecharMenu()">A Empresa</a></li>
      <li><a routerLink="/projetos-sociais" (click)="fecharMenu()">Projetos Sociais</a></li>
    </ul>
  </div>
</nav>
